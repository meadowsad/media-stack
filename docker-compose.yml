services:

  sabnzbd:
    image: linuxserver/sabnzbd:latest
    container_name: sabnzbd
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./sabnzbd:/config
      - /storage/data/local/downloads:/downloads
      - /storage/data/local/downloads/incomplete:/incomplete-downloads
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - media

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./sonarr:/config
      - /storage/data/nas/media/tv:/tv
      - /storage/data/local/downloads:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped
    depends_on:
      - sabnzbd
    networks:
      - media

  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./radarr:/config
      - /storage/data/nas/media/movies:/movies
      - /storage/data/local/downloads:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped
    depends_on:
      - sabnzbd
    networks:
      - media

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - /storage/data/nas/media/tv:/data/tv
      - /storage/data/nas/media/movies:/data/movies
    ports:
      - "8096:8096"
    restart: unless-stopped
    networks:
      - media-readonly

networks:
  media:
    driver: bridge
  media-readonly:
    driver: bridge
